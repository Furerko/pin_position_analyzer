name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --onefile --console --name pin_position_excel_report pin_position_excel_report.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: pin_position_excel_report_windows_exe
          path: dist/pin_position_excel_report.exe
